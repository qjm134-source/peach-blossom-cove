<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幻境漫游 - 游戏世界</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    #game-page {
      width: 100%;
      height: 100%;
      position: relative;
      background-image: url('assets/previews/preview_midautumn.jpg');
      background-size: cover;
      background-position: center;
    }

    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%);
    }

    .game-hint {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      padding: 15px 30px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      border: 1px solid rgba(255,215,0,0.3);
      animation: pulse 2s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .video-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .video-container.active {
      display: flex;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .close-video-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 1000;
    }

    .close-video-btn:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .fullscreen-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }

    .fullscreen-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .current-activities {
      position: absolute;
      top: 60px;
      left: 15px;
      right: 15px;
      z-index: 20;
    }

    .activities-title {
      font-size: 0.85rem;
      color: #ffd700;
      margin-bottom: 8px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activities-title::before {
      content: '';
      width: 4px;
      height: 14px;
      background: linear-gradient(to bottom, #ffd700, #daa520);
      border-radius: 2px;
    }

    .activities-grid {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .activities-grid::-webkit-scrollbar {
      display: none;
    }

    .activity-card {
      flex: 0 0 calc(33.33% - 7px);
      max-width: 160px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,215,0,0.2);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
    }

    .activity-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,215,0,0.5);
      box-shadow: 0 4px 15px rgba(255,215,0,0.15);
    }

    .activity-image {
      width: 100%;
      height: 65px;
      object-fit: cover;
    }

    .activity-info {
      padding: 6px 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .activity-name {
      font-size: 0.7rem;
      color: #fff;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .activity-tag {
      font-size: 0.45rem;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
    }

    .activity-tag.active {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }

    .activity-tag.upcoming {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }

    .activity-participants {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .activity-participants::before {
      content: '👥';
      font-size: 0.6rem;
    }

    /* 虚拟摇杆 */
    .joystick-wrapper {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 50;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .joystick-base {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,0.3);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }

    .joystick-base.active {
      border-color: rgba(255,215,0,0.7);
      background: rgba(255,255,255,0.12);
    }

    .joystick-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.7), rgba(255,215,0,0.4));
      border: 1px solid rgba(255,215,0,0.5);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease-out;
      pointer-events: none;
    }

    .joystick-base.active .joystick-thumb {
      transition: none;
    }
  </style>
</head>
<body>
  <div id="game-page">
    <div class="game-overlay"></div>
    <a href="world-select.html" class="back-btn">←</a>
    <button class="fullscreen-btn" id="fullscreen-btn" title="全屏">⛶</button>
    <div class="current-activities">
      <h3 class="activities-title">当前活动</h3>
      <div class="activities-grid">
        <div class="activity-card" data-activity="mid-autumn">
          <img class="activity-image" src="assets/previews/preview_midautumn.jpg" alt="中秋节">
          <div class="activity-info">
            <div class="activity-name">
              <span>中秋节</span>
              <span class="activity-tag active">进行中</span>
            </div>
            <div class="activity-participants">15人参与</div>
          </div>
        </div>
        <div class="activity-card" data-activity="qixi">
          <img class="activity-image" src="assets/previews/preview_poem.jpg" alt="七夕节">
          <div class="activity-info">
            <div class="activity-name">
              <span>七夕节</span>
              <span class="activity-tag upcoming">可预约</span>
            </div>
            <div class="activity-participants">12人参与</div>
          </div>
        </div>
        <div class="activity-card" data-activity="spring-festival">
          <img class="activity-image" src="assets/previews/preview_wedding.jpg" alt="春节">
          <div class="activity-info">
            <div class="activity-name">
              <span>春节</span>
              <span class="activity-tag upcoming">可预约</span>
            </div>
            <div class="activity-participants">20人参与</div>
          </div>
        </div>
      </div>
    </div>
    <div class="game-hint">
      <div style="font-size: 1.3rem; margin-bottom: 8px; color: #ffd700;">🎮 游戏控制</div>
      <div>按下 WASD / 方向键 或滑动摇杆开始游戏</div>
    </div>
  </div>

  <!-- 虚拟摇杆 -->
  <div class="joystick-wrapper" id="joystick-wrapper">
    <div class="joystick-base" id="joystick-base">
      <div class="joystick-thumb" id="joystick-thumb"></div>
    </div>
  </div>

  <div class="video-container" id="video-container">
    <button class="close-video-btn" id="close-video-btn">✕</button>
    <video id="game-video" playsinline webkit-playsinline></video>
  </div>

  <script>
    const videoContainer = document.getElementById('video-container');
    const gameVideo = document.getElementById('game-video');
    const closeVideoBtn = document.getElementById('close-video-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    function startGame() {
      videoContainer.classList.add('active');
      gameVideo.src = 'assets/scene/market.mp4';
      gameVideo.load();
      gameVideo.addEventListener('canplay', function onCanPlay() {
        gameVideo.removeEventListener('canplay', onCanPlay);
        gameVideo.play().catch(err => {
          console.log('播放失败:', err);
        });
        gameVideo.requestFullscreen().catch(err => {
          console.log('全屏失败:', err);
        });
      }, { once: true });
    }

    function closeVideo() {
      videoContainer.classList.remove('active');
      gameVideo.pause();
      gameVideo.src = '';
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
        e.preventDefault();
        if (!videoContainer.classList.contains('active')) {
          startGame();
        }
      }
    });

    closeVideoBtn.addEventListener('click', closeVideo);

    gameVideo.addEventListener('ended', closeVideo);

    document.querySelector('.activity-card[data-activity="mid-autumn"]').addEventListener('click', () => {
      window.location.href = 'product-showcase.html';
    });

    // === 虚拟摇杆 ===
    const joystickBase = document.getElementById('joystick-base');
    const joystickThumb = document.getElementById('joystick-thumb');
    const joyCenter = { x: 0, y: 0 };
    const maxRadius = 18;
    const triggerThreshold = 8;
    let joyActive = false;
    let joyTriggered = false;

    function getPoint(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function joyStart(e) {
      e.preventDefault();
      joyActive = true;
      joyTriggered = false;
      const rect = joystickBase.getBoundingClientRect();
      joyCenter.x = rect.left + rect.width / 2;
      joyCenter.y = rect.top + rect.height / 2;
      joystickBase.classList.add('active');
    }

    function joyMove(e) {
      if (!joyActive) return;
      e.preventDefault();
      const pt = getPoint(e);
      let dx = pt.x - joyCenter.x;
      let dy = pt.y - joyCenter.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxRadius) {
        dx = (dx / dist) * maxRadius;
        dy = (dy / dist) * maxRadius;
      }
      joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      if (dist > triggerThreshold && !joyTriggered && !videoContainer.classList.contains('active')) {
        joyTriggered = true;
        startGame();
      }
    }

    function joyEnd(e) {
      if (!joyActive) return;
      e.preventDefault();
      joyActive = false;
      joystickBase.classList.remove('active');
      joystickThumb.style.transform = 'translate(-50%, -50%)';
    }

    joystickBase.addEventListener('touchstart', joyStart, { passive: false });
    document.addEventListener('touchmove', joyMove, { passive: false });
    document.addEventListener('touchend', joyEnd, { passive: false });
    document.addEventListener('touchcancel', joyEnd, { passive: false });
    joystickBase.addEventListener('mousedown', joyStart);
    document.addEventListener('mousemove', joyMove);
    document.addEventListener('mouseup', joyEnd);

    const observer = new MutationObserver(() => {
      if (videoContainer.classList.contains('active')) {
        document.getElementById('joystick-wrapper').style.display = 'none';
      } else {
        document.getElementById('joystick-wrapper').style.display = '';
      }
    });
    observer.observe(videoContainer, { attributes: true, attributeFilter: ['class'] });

    // === 全屏功能 ===
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log('全屏失败:', err);
        });
      } else {
        document.exitFullscreen();
      }
    }

    function updateFullscreenIcon() {
      fullscreenBtn.innerHTML = document.fullscreenElement ? '⛶' : '⛶';
    }

    fullscreenBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
  </script>
</body>
</html>
