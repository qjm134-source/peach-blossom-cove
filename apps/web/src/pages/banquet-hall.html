<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幻境漫游 - 中式宴会厅</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'STKaiti', 'KaiTi', serif;
    }

    #banquet-hall {
      width: 100%;
      height: 100%;
      position: relative;
      background-image: url('/assets/previews/preview_wedding.jpg');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* 背景装饰元素 */
    .lantern {
      position: absolute;
      width: 40px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, #ff3333, #cc0000);
      border-radius: 50% 50% 40% 40%;
      box-shadow: 0 0 15px #ff3333, inset 0 -10px 10px rgba(0,0,0,0.5);
      z-index: 5;
    }

    .lantern::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 10px;
      background: #ffd700;
      border-radius: 3px;
    }

    .lantern::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 30px;
      background: radial-gradient(circle at 50% 0, #ff6666, #cc0000);
      border-radius: 50% 50% 40% 40%;
      box-shadow: inset 0 -5px 5px rgba(0,0,0,0.3);
    }

    .red-ribbon {
      position: absolute;
      height: 4px;
      background: linear-gradient(to right, #ff3333, #ff6666, #ff3333);
      transform-origin: center;
      z-index: 4;
    }

    /* 圆桌样式 */
    .round-table {
      position: absolute;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, #8b4513, #5d2906);
      border-radius: 50%;
      border: 8px solid #a0522d;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .table-cloth {
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, #ff6666, #cc0000);
      border-radius: 50%;
      border: 3px solid #ff3333;
    }

    /* 花堂样式 */
    .flower-hall {
      position: absolute;
      width: 200px;
      height: 150px;
      background: linear-gradient(to bottom, #8b0000, #660000);
      border: 8px solid #ffd700;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 15;
    }

    .hall-roof {
      position: absolute;
      top: -30px;
      width: 220px;
      height: 40px;
      background: linear-gradient(to bottom, #8b4513, #5d2906);
      clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
    }

    .hall-decorations {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .hall-flower {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #ffd700, #daa520);
      border-radius: 50%;
      box-shadow: 0 0 10px #ffd700;
    }

    .hall-couplets {
      position: absolute;
      width: 180px;
      text-align: center;
      color: #ffd700;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    /* 角色样式 */
    .character {
      position: absolute;
      width: 50px;
      height: 80px;
      z-index: 20;
      transition: transform 0.3s;
    }

    .character-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .chat-bubble {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      color: #333;
      border: 2px solid #8b4513;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 25;
    }

    .chat-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: #8b4513 transparent transparent;
    }

    .chat-bubble::before {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: #fff transparent transparent;
    }

    .chat-bubble.show {
      opacity: 1;
    }

    /* 控制按钮 */
    .controls {
      position: absolute;
      top: 70px;
      left: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 30;
    }

    .control-btn {
      padding: 12px 25px;
      background: linear-gradient(to bottom, #ffd700, #daa520);
      border: 3px solid #8b4513;
      border-radius: 30px;
      color: #8b0000;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .control-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      background: linear-gradient(to bottom, #ffec8b, #ffd700);
    }

    .control-btn:active {
      transform: translateY(1px);
    }

    /* 红包动画 */
    .red-envelope {
      position: absolute;
      width: 80px;
      height: 100px;
      background: linear-gradient(to bottom, #ff3333, #cc0000);
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      z-index: 25;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    .envelope-gold {
      width: 70px;
      height: 30px;
      background: linear-gradient(to bottom, #ffd700, #daa520);
      border-radius: 5px;
      margin-bottom: 5px;
    }

    .envelope-text {
      color: #ffd700;
      font-size: 0.7rem;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* 烟花效果 */
    .firework {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 25;
    }

    /* 返回按钮 */
    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .fullscreen-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }

    .fullscreen-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    /* 提示信息 */
    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      padding: 12px 25px;
      background: transparent;
      border-radius: 20px;
      border: none;
      animation: pulse 2s ease-in-out infinite;
      z-index: 50;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="banquet-hall">
    <!-- 装饰元素 -->
    <div class="lantern" style="top: 50px; left: 100px;"></div>
    <div class="lantern" style="top: 50px; right: 100px;"></div>
    <div class="lantern" style="top: 150px; left: 200px;"></div>
    <div class="lantern" style="top: 150px; right: 200px;"></div>

    <div class="red-ribbon" style="top: 80px; left: 150px; width: 300px; transform: rotate(5deg);"></div>
    <div class="red-ribbon" style="top: 80px; right: 150px; width: 300px; transform: rotate(-5deg);"></div>





    <!-- 角色容器 -->
    <div id="characters-container"></div>

    <!-- 返回按钮 -->
    <a href="/src/pages/world-select.html" class="back-btn">←</a>
    <button class="fullscreen-btn" id="fullscreen-btn" title="全屏">⛶</button>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="control-btn" id="red-envelope-btn">送红包</button>
      <button class="control-btn" id="firework-btn">放烟花</button>
    </div>

    <!-- 聊天框 -->
    <div class="chat-input-container" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; gap: 10px;">
      <input type="text" id="chat-input" placeholder="输入聊天内容..." style="padding: 10px; width: 250px; border-radius: 20px; border: 2px solid #8b4513; outline: none; font-size: 1rem;">
      <button class="control-btn" id="send-chat-btn" style="padding: 10px 20px;">发送</button>
    </div>


    <div class="tips" style="position: absolute; bottom: 35px; right: 20px; text-align: right; color: rgba(255,255,255,0.8); font-size: 0.85rem; z-index: 45;">
      <div>使用 WASD 或方向键控制角色移动</div>
      <div>点击附近宾客发送祝福</div>
    </div>
  </div>

  <script>
    // 页面元素引用
    const banquetHall = document.getElementById('banquet-hall');
    const charactersContainer = document.getElementById('characters-container');
    const redEnvelopeBtn = document.getElementById('red-envelope-btn');
    const fireworkBtn = document.getElementById('firework-btn');
    const chatInput = document.getElementById('chat-input');
    const sendChatBtn = document.getElementById('send-chat-btn');

    // 模拟宾客数据
    const guestCharacters = [
      { id: 'guest1', name: '宾客甲', x: 250, y: 300, avatar: '/assets/characters/scholar.png' },
      { id: 'guest4', name: '宾客丁', x: 500, y: 450, avatar: '/assets/characters/modern.png' },
      { id: 'guest6', name: '宾客己', x: 670, y: 200, avatar: '/assets/characters/maiden.png' }
    ];

    // 祝福语库
    const blessings = [
      '恭喜恭喜！',
      '百年好合！',
      '早生贵子！',
      '白头偕老！',
      '幸福美满！',
      '新婚快乐！',
      '天作之合！',
      '珠联璧合！'
    ];

    // 玩家数据
    let player = {
      id: 'player',
      name: '你',
      x: 400,
      y: 500,
      avatar: '/assets/characters/scholar.png',
      element: null
    };

    // 初始化场景
    function initScene() {
      // 创建模拟宾客
      guestCharacters.forEach(guest => {
        createCharacter(guest, false);
      });

      // 创建玩家角色
      player.element = createCharacter(player, true);

      // 绑定事件
      bindEvents();
    }

    // 创建角色元素
    function createCharacter(character, isPlayer) {
      const charElement = document.createElement('div');
      charElement.className = 'character';
      charElement.style.left = `${character.x}px`;
      charElement.style.top = `${character.y}px`;
      charElement.dataset.id = character.id;

      const img = document.createElement('img');
      img.className = 'character-img';
      img.src = character.avatar;
      img.alt = character.name;

      const chatBubble = document.createElement('div');
      chatBubble.className = 'chat-bubble';
      chatBubble.id = `bubble-${character.id}`;

      charElement.appendChild(img);
      charElement.appendChild(chatBubble);
      charactersContainer.appendChild(charElement);

      // 如果不是玩家，定期产生随机动作
      if (!isPlayer) {
        setInterval(() => {
          if (Math.random() > 0.7) {
            // 随机显示祝福语
            const blessing = blessings[Math.floor(Math.random() * blessings.length)];
            showChatBubble(character.id, blessing);
          }
        }, 5000 + Math.random() * 10000);
      }

      return charElement;
    }

    // 显示聊天气泡
    function showChatBubble(characterId, message) {
      const bubble = document.getElementById(`bubble-${characterId}`);
      if (bubble) {
        bubble.textContent = message;
        bubble.classList.add('show');

        setTimeout(() => {
          bubble.classList.remove('show');
        }, 3000);
      }
    }

    // 移动玩家角色
    function movePlayer(dx, dy) {
      const newX = player.x + dx;
      const newY = player.y + dy;

      // 边界检测
      if (newX >= 50 && newX <= window.innerWidth - 100 &&
          newY >= 50 && newY <= window.innerHeight - 150) {
        player.x = newX;
        player.y = newY;
        if (player.element) {
          player.element.style.left = `${player.x}px`;
          player.element.style.top = `${player.y}px`;
        }
      }
    }

    // 发送红包动画
    function sendRedEnvelope() {
      // 创建红包元素
      const envelope = document.createElement('div');
      envelope.className = 'red-envelope';
      envelope.innerHTML = `
        <div class="envelope-gold"></div>
        <div class="envelope-text">祝福送上！</div>
      `;

      // 设置起始位置（玩家位置）
      envelope.style.left = `${player.x}px`;
      envelope.style.top = `${player.y}px`;
      envelope.style.opacity = '1';
      banquetHall.appendChild(envelope);

      // 动画到花堂中心
      const centerX = window.innerWidth / 2;
      const centerY = 200;

      // 使用CSS动画
      envelope.animate([
        { transform: `translate(0, 0)`, opacity: 1 },
        { transform: `translate(${centerX - player.x - 40}px, ${centerY - player.y - 50}px)`, opacity: 1 },
        { transform: `translate(${centerX - player.x - 40}px, ${centerY - player.y - 50}px)`, opacity: 0 }
      ], {
        duration: 2000,
        easing: 'ease-out'
      });

      // 动画结束后移除元素
      setTimeout(() => {
        envelope.remove();
      }, 2000);

      // 所有宾客显示恭喜消息
      guestCharacters.forEach(guest => {
        showChatBubble(guest.id, '恭喜！');
      });
    }

    // 放烟花动画
    function launchFireworks() {
      // 在顶部创建多个烟花粒子
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const firework = document.createElement('div');
          firework.className = 'firework';

          // 随机颜色
          const colors = ['#ff3333', '#33ccff', '#33ff33', '#ffcc00', '#ff33ff'];
          const color = colors[Math.floor(Math.random() * colors.length)];
          firework.style.backgroundColor = color;
          firework.style.boxShadow = `0 0 10px ${color}`;

          // 随机位置
          const startX = Math.random() * window.innerWidth;
          const startY = 0;
          firework.style.left = `${startX}px`;
          firework.style.top = `${startY}px`;

          banquetHall.appendChild(firework);

          // 动画到随机位置然后爆炸
          const endX = startX + (Math.random() - 0.5) * 300;
          const endY = 100 + Math.random() * 200;

          firework.animate([
            { transform: 'translate(0, 0)', opacity: 1 },
            { transform: `translate(${endX - startX}px, ${endY - startY}px)`, opacity: 1 },
            { transform: `translate(${endX - startX}px, ${endY - startY}px)`, opacity: 0 }
          ], {
            duration: 2000 + Math.random() * 1000,
            easing: 'ease-out'
          });

          // 动画结束后移除元素
          setTimeout(() => {
            firework.remove();
          }, 2000 + Math.random() * 1000);
        }, i * 100);
      }

      // 所有宾客显示"哇"表情
      guestCharacters.forEach(guest => {
        showChatBubble(guest.id, '哇！');
      });
    }

    // 发送玩家聊天
    function sendPlayerChat() {
      const message = chatInput.value.trim();
      if (message) {
        showChatBubble(player.id, message);
        chatInput.value = '';
      }
    }

    // 绑定事件
    function bindEvents() {
      // 键盘控制
      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        switch (key) {
          case 'w':
          case 'arrowup':
            movePlayer(0, -10);
            break;
          case 's':
          case 'arrowdown':
            movePlayer(0, 10);
            break;
          case 'a':
          case 'arrowleft':
            movePlayer(-10, 0);
            break;
          case 'd':
          case 'arrowright':
            movePlayer(10, 0);
            break;
        }
      });

      // 红包按钮
      redEnvelopeBtn.addEventListener('click', sendRedEnvelope);

      // 烟花按钮
      fireworkBtn.addEventListener('click', launchFireworks);

      // 宾客点击交互
      charactersContainer.addEventListener('click', (e) => {
        const character = e.target.closest('.character');
        if (character && !character.dataset.id.startsWith('player')) {
          // 检查距离是否足够近
          const rect = character.getBoundingClientRect();
          const playerRect = player.element.getBoundingClientRect();
          const distance = Math.sqrt(
            Math.pow(rect.left - playerRect.left, 2) +
            Math.pow(rect.top - playerRect.top, 2)
          );

          if (distance < 100) {
            // 发送祝福语
            const blessings = ['新婚快乐！', '百年好合！', '幸福美满！'];
            const blessing = blessings[Math.floor(Math.random() * blessings.length)];
            showChatBubble(character.dataset.id, blessing);

            // 宾客回复
            setTimeout(() => {
              showChatBubble(character.dataset.id, '😊');
            }, 1000);
          }
        }
      });

      // 聊天输入框回车发送
      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          sendPlayerChat();
        }
      });

      // 发送聊天按钮
      sendChatBtn.addEventListener('click', sendPlayerChat);
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initScene);

    // === 全屏功能 ===
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log('全屏失败:', err);
        });
      } else {
        document.exitFullscreen();
      }
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);
  </script>
</body>
</html>
