<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幻境漫游 - 婚礼宴请</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    #wedding-page {
      width: 100%;
      height: 100%;
      position: relative;
      background-image: url('/assets/previews/preview_wedding.jpg');
      background-size: cover;
      background-position: center;
    }

    .wedding-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%);
    }

    .wedding-hint {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      padding: 15px 30px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      border: 1px solid rgba(255,215,0,0.3);
      animation: pulse 2s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .video-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .video-container.active {
      display: flex;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .close-video-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-video-btn:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .fullscreen-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
    }

    .fullscreen-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .current-activities {
      position: absolute;
      top: 60px;
      left: 15px;
      right: 15px;
      z-index: 20;
    }

    .activities-title {
      font-size: 0.85rem;
      color: #ffd700;
      margin-bottom: 8px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activities-title::before {
      content: '';
      width: 4px;
      height: 14px;
      background: linear-gradient(to bottom, #ffd700, #daa520);
      border-radius: 2px;
    }

    .activities-grid {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .activities-grid::-webkit-scrollbar {
      display: none;
    }

    .activity-card {
      flex: 0 0 calc(33.33% - 7px);
      max-width: 160px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,215,0,0.2);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
    }

    .activity-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,215,0,0.5);
      box-shadow: 0 4px 15px rgba(255,215,0,0.15);
    }

    .activity-image {
      width: 100%;
      height: 65px;
      object-fit: cover;
    }

    .activity-info {
      padding: 6px 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .activity-name {
      font-size: 0.7rem;
      color: #fff;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .activity-tag {
      font-size: 0.45rem;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
    }

    .activity-tag.active {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }

    .activity-tag.upcoming {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }

    .activity-participants {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .activity-participants::before {
      content: '👥';
      font-size: 0.6rem;
    }
  </style>
</head>
<body>
  <div id="wedding-page">
    <div class="wedding-overlay"></div>
    <a href="/src/pages/world-select.html" class="back-btn">←</a>
    <button class="fullscreen-btn" id="fullscreen-btn" title="全屏">⛶</button>
    <div class="current-activities">
      <h3 class="activities-title">当前活动</h3>
      <div class="activities-grid">
        <div class="activity-card" data-activity="class-reunion">
          <img class="activity-image" src="/assets/previews/preview_poem.jpg" alt="同学聚会">
          <div class="activity-info">
            <div class="activity-name">
              <span>同学聚会</span>
              <span class="activity-tag upcoming">可预约</span>
            </div>
            <div class="activity-participants">10人参与</div>
          </div>
        </div>
        <div class="activity-card" data-activity="banquet-hall">
          <img class="activity-image" src="/assets/previews/banquet.jpg" alt="婚礼宴请">
          <div class="activity-info">
            <div class="activity-name">
              <span>婚礼宴请</span>
              <span class="activity-tag active">进行中</span>
            </div>
            <div class="activity-participants">12人参与</div>
          </div>
        </div>
        <div class="activity-card" data-activity="birthday-party">
          <img class="activity-image" src="/assets/previews/preview_midautumn.jpg" alt="生日派对">
          <div class="activity-info">
            <div class="activity-name">
              <span>生日派对</span>
              <span class="activity-tag upcoming">可预约</span>
            </div>
            <div class="activity-participants">6人参与</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="video-container" id="video-container">
    <button class="close-video-btn" id="close-video-btn">✕</button>
    <video id="wedding-video" playsinline webkit-playsinline></video>
  </div>

  <script>
    const videoContainer = document.getElementById('video-container');
    const weddingVideo = document.getElementById('wedding-video');
    const closeVideoBtn = document.getElementById('close-video-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    function startWedding() {
      videoContainer.classList.add('active');
      weddingVideo.src = '/assets/scene/wedding.mp4';
      weddingVideo.load();
      weddingVideo.addEventListener('canplay', function onCanPlay() {
        weddingVideo.removeEventListener('canplay', onCanPlay);
        weddingVideo.play().catch(err => {
          console.log('播放失败:', err);
        });
        weddingVideo.requestFullscreen().catch(err => {
          console.log('全屏失败:', err);
        });
      }, { once: true });
    }

    function closeVideo() {
      videoContainer.classList.remove('active');
      weddingVideo.pause();
      weddingVideo.src = '';
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
        e.preventDefault();
        if (!videoContainer.classList.contains('active')) {
          startWedding();
        }
      }
    });

    closeVideoBtn.addEventListener('click', closeVideo);

    weddingVideo.addEventListener('ended', closeVideo);

    // 添加活动卡片点击事件
    document.querySelectorAll('.activity-card').forEach(card => {
      card.addEventListener('click', () => {
        const activity = card.dataset.activity;
        if (activity === 'banquet-hall') {
          window.location.href = '/src/pages/banquet-hall.html';
        } else if (activity === 'class-reunion') {
          window.location.href = '/src/pages/poem-page.html';
        } else if (activity === 'birthday-party') {
          window.location.href = '/src/pages/game-page.html';
        }
      });
    });

    // === 全屏功能 ===
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log('全屏失败:', err);
        });
      } else {
        document.exitFullscreen();
      }
    }

    fullscreenBtn.addEventListener('click', toggleFullscreen);
  </script>
</body>
</html>
