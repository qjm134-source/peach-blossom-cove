<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长安繁华 - 幻境漫游</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('assets/previews/town.png') center/cover no-repeat;
      font-family: 'STKaiti', 'KaiTi', serif;
    }

    .page-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.4));
      z-index: 1;
    }

    .page-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: #fff;
      text-align: center;
    }

    .page-title {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      animation: float 3s ease-in-out infinite;
    }

    .page-subtitle {
      font-size: 1.2rem;
      margin-bottom: 3rem;
      opacity: 0.8;
    }

    .start-hint {
      font-size: 1.5rem;
      padding: 1rem 3rem;
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 50px;
      background: rgba(0,0,0,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .video-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .video-overlay.active {
      display: flex;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 101;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(255,0,0,0.5);
      border-color: #fff;
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 100;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    /* 虚拟摇杆 */
    .joystick-wrapper {
      position: fixed;
      bottom: 40px;
      left: 20px;
      z-index: 50;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .joystick-base {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,0.3);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }

    .joystick-base.active {
      border-color: rgba(255,215,0,0.7);
      background: rgba(255,255,255,0.12);
    }

    .joystick-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.7), rgba(255,215,0,0.4));
      border: 1px solid rgba(255,215,0,0.5);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease-out;
      pointer-events: none;
    }

    .joystick-base.active .joystick-thumb {
      transition: none;
    }
  </style>
</head>
<body>
  <div class="page-overlay"></div>
  <a href="world-select.html" class="back-btn">←</a>
  <div class="page-content">
    <h1 class="page-title">长安繁华</h1>
    <p class="page-subtitle">漫步千年古都，感受盛世繁华</p>
    <div class="start-hint">按下 WASD / 方向键 或滑动摇杆开始体验</div>
  </div>

  <!-- 虚拟摇杆 -->
  <div class="joystick-wrapper" id="joystick-wrapper">
    <div class="joystick-base" id="joystick-base">
      <div class="joystick-thumb" id="joystick-thumb"></div>
    </div>
  </div>

  <div class="video-overlay" id="video-overlay">
    <button class="close-btn" id="close-btn">✕</button>
    <div class="video-container">
      <video id="scene-video" controls autoplay playsinline>
        <source src="assets/scene/town.mp4" type="video/mp4">
        您的浏览器不支持视频播放
      </video>
    </div>
  </div>

  <script>
    const videoOverlay = document.getElementById('video-overlay');
    const sceneVideo = document.getElementById('scene-video');
    const closeBtn = document.getElementById('close-btn');
    let hasStarted = false;

    function startScene() {
      if (hasStarted) return;
      hasStarted = true;
      videoOverlay.classList.add('active');
      sceneVideo.play();
      sceneVideo.requestFullscreen();
    }

    document.addEventListener('keydown', (e) => {
      const keys = ['w', 'a', 's', 'd', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
      if (keys.includes(e.key.toLowerCase()) || keys.includes(e.key)) {
        e.preventDefault();
        startScene();
      }
    });

    closeBtn.addEventListener('click', () => {
      videoOverlay.classList.remove('active');
      sceneVideo.pause();
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      hasStarted = false;
    });

    sceneVideo.addEventListener('ended', () => {
      videoOverlay.classList.remove('active');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      hasStarted = false;
    });

    // === 虚拟摇杆 ===
    const joystickBase = document.getElementById('joystick-base');
    const joystickThumb = document.getElementById('joystick-thumb');
    const joyCenter = { x: 0, y: 0 };
    const maxRadius = 18;
    const triggerThreshold = 8;
    let joyActive = false;
    let joyTriggered = false;

    function getPoint(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function joyStart(e) {
      e.preventDefault();
      joyActive = true;
      joyTriggered = false;
      const rect = joystickBase.getBoundingClientRect();
      joyCenter.x = rect.left + rect.width / 2;
      joyCenter.y = rect.top + rect.height / 2;
      joystickBase.classList.add('active');
    }

    function joyMove(e) {
      if (!joyActive) return;
      e.preventDefault();
      const pt = getPoint(e);
      let dx = pt.x - joyCenter.x;
      let dy = pt.y - joyCenter.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxRadius) {
        dx = (dx / dist) * maxRadius;
        dy = (dy / dist) * maxRadius;
      }
      joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      if (dist > triggerThreshold && !joyTriggered) {
        joyTriggered = true;
        startScene();
      }
    }

    function joyEnd(e) {
      if (!joyActive) return;
      e.preventDefault();
      joyActive = false;
      joystickBase.classList.remove('active');
      joystickThumb.style.transform = 'translate(-50%, -50%)';
    }

    joystickBase.addEventListener('touchstart', joyStart, { passive: false });
    document.addEventListener('touchmove', joyMove, { passive: false });
    document.addEventListener('touchend', joyEnd, { passive: false });
    document.addEventListener('touchcancel', joyEnd, { passive: false });
    joystickBase.addEventListener('mousedown', joyStart);
    document.addEventListener('mousemove', joyMove);
    document.addEventListener('mouseup', joyEnd);

    const observer = new MutationObserver(() => {
      if (videoOverlay.classList.contains('active')) {
        document.getElementById('joystick-wrapper').style.display = 'none';
      } else {
        document.getElementById('joystick-wrapper').style.display = '';
      }
    });
    observer.observe(videoOverlay, { attributes: true, attributeFilter: ['class'] });
  </script>
</body>
</html>
