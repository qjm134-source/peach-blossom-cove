<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长安繁华 - 幻境漫游</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('assets/previews/town.png') center/cover no-repeat;
      font-family: 'STKaiti', 'KaiTi', serif;
    }

    .page-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.4));
      z-index: 1;
    }

    .page-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: #fff;
      text-align: center;
    }

    .page-title {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      animation: float 3s ease-in-out infinite;
    }

    .page-subtitle {
      font-size: 1.2rem;
      margin-bottom: 3rem;
      opacity: 0.8;
    }

    .start-hint {
      font-size: 1.5rem;
      padding: 1rem 3rem;
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 50px;
      background: rgba(0,0,0,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .video-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .video-overlay.active {
      display: flex;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 101;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: rgba(255,0,0,0.5);
      border-color: #fff;
    }
  </style>
</head>
<body>
  <div class="page-overlay"></div>
  <div class="page-content">
    <h1 class="page-title">长安繁华</h1>
    <p class="page-subtitle">漫步千年古都，感受盛世繁华</p>
    <div class="start-hint">按下 WASD 或方向键开始体验</div>
  </div>

  <div class="video-overlay" id="video-overlay">
    <button class="close-btn" id="close-btn">✕</button>
    <div class="video-container">
      <video id="scene-video" controls autoplay playsinline>
        <source src="assets/scene/town.mp4" type="video/mp4">
        您的浏览器不支持视频播放
      </video>
    </div>
  </div>

  <script>
    const videoOverlay = document.getElementById('video-overlay');
    const sceneVideo = document.getElementById('scene-video');
    const closeBtn = document.getElementById('close-btn');
    let hasStarted = false;

    function startScene() {
      if (hasStarted) return;
      hasStarted = true;
      videoOverlay.classList.add('active');
      sceneVideo.play();
      sceneVideo.requestFullscreen();
    }

    document.addEventListener('keydown', (e) => {
      const keys = ['w', 'a', 's', 'd', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
      if (keys.includes(e.key.toLowerCase()) || keys.includes(e.key)) {
        e.preventDefault();
        startScene();
      }
    });

    closeBtn.addEventListener('click', () => {
      videoOverlay.classList.remove('active');
      sceneVideo.pause();
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      hasStarted = false;
    });

    sceneVideo.addEventListener('ended', () => {
      videoOverlay.classList.remove('active');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      }
      hasStarted = false;
    });
  </script>
</body>
</html>
