<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品展示 - 幻境漫游</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0e1a url('assets/previews/preview_midautumn.jpg') no-repeat center center;
      background-size: cover;
      color: #e8ecf4;
    }

    #product-showcase {
      width: 100%;
      height: 100%;
      position: relative;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      z-index: 1;
    }

    .page-title {
      font-size: 1.8rem;
      color: #ffd700;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .page-subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 15px;
    }

    .balance-display {
      font-size: 1.2rem;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .balance-display span {
      color: #ffd700;
      font-weight: bold;
    }

    .products-container {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 130px);
      grid-template-rows: repeat(2, auto);
      gap: 40px;
      overflow-y: auto;
      padding: 10px;
      justify-content: center;
      align-content: center;
    }

    .products-container::-webkit-scrollbar {
      width: 6px;
    }

    .products-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
    }

    .products-container::-webkit-scrollbar-thumb {
      background: rgba(255,215,0,0.3);
      border-radius: 3px;
    }

    .products-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255,215,0,0.5);
    }

    .product-card {
      background: rgba(255, 248, 230, 0.9);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      border: 2px solid rgba(139, 69, 19, 0.3);
      transition: all 0.3s ease;
      aspect-ratio: 4/5;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 215, 0, 0.6);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
    }

    .product-image {
      width: 100%;
      height: 55%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: rgba(139, 69, 19, 0.2);
      border-bottom: 2px solid rgba(139, 69, 19, 0.3);
    }

    .product-info {
      padding: 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(255, 248, 230, 0.95);
    }

    .product-name {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 3px;
      text-align: center;
      color: #5d4e37;
    }

    .product-price {
      font-size: 0.75rem;
      color: #8b4513;
      text-align: center;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .product-tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      margin: 0 auto;
    }

    .tag-hot {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .tag-new {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .tag-owned {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: linear-gradient(135deg, #0a0e1a, #1a1a3e);
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      padding: 25px;
      position: relative;
      border: 1px solid rgba(255, 215, 0, 0.3);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal.active .modal-content {
      transform: scale(1);
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-modal:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(90deg);
    }

    .modal-image {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .modal-name {
      font-size: 1.5rem;
      color: #ffd700;
      text-align: center;
      margin-bottom: 10px;
    }

    .modal-description {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
      text-align: center;
      color: #ccc;
    }

    .modal-price {
      font-size: 1.3rem;
      color: #ffd700;
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .purchase-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .purchase-btn:hover {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
    }

    .purchase-btn:disabled {
      background: #6b7280;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .notification.success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .notification.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .notification.show {
      opacity: 1;
    }

    .checkmark {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-left: 3px solid white;
      border-bottom: 3px solid white;
      transform: rotate(-45deg);
      margin-right: 8px;
    }

    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 10;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .products-container {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 15px;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .modal-content {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .products-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .product-image {
        font-size: 2rem;
      }

      .modal-image {
        height: 150px;
        font-size: 4rem;
      }
    }
  </style>
</head>
<body>
  <div id="product-showcase">
    <a href="world-select.html" class="back-btn">←</a>

    <div class="header">
      <h1 class="page-title">幻境奇珍</h1>
      <p class="page-subtitle">收集珍贵的奇珍异宝</p>
      <div class="balance-display">灵石余额：<span id="balance">500</span> 灵石</div>
    </div>

    <div class="products-container" id="products-container">
      <!-- 商品卡片将通过JavaScript生成 -->
    </div>

    <div class="modal" id="product-modal">
      <div class="modal-content">
        <button class="close-modal" id="close-modal">×</button>
        <div class="modal-image" id="modal-image"></div>
        <h2 class="modal-name" id="modal-name"></h2>
        <p class="modal-description" id="modal-description"></p>
        <div class="modal-price" id="modal-price"></div>
        <button class="purchase-btn" id="purchase-btn">购买</button>
      </div>
    </div>

    <div class="notification" id="notification"></div>
  </div>

  <script>
    // 商品数据
    const products = [
      {
        id: 1,
        name: "汉服·青衫",
        price: 150,
        type: "hot",
        description: "典雅的汉服青衫，绣有精致的云纹图案，穿着舒适，适合各种传统场合。"
      },
      {
        id: 2,
        name: "发簪·步摇",
        price: 200,
        type: "hot",
        description: "精美的银质发簪，镶嵌着珍珠和宝石，轻盈的步摇设计让发饰更添灵动。"
      },
      {
        id: 3,
        name: "折扇·山水",
        price: 120,
        type: "new",
        description: "以山水为题材的精美折扇，扇面绘制细腻入微，展现中国画的韵味。"
      },
      {
        id: 4,
        name: "灯笼·流光",
        price: 180,
        type: "hot",
        description: "流光溢彩的古典灯笼，采用丝绸材质，夜晚点亮时散发着温暖的光芒。"
      },
      {
        id: 5,
        name: "玉佩·如意",
        price: 300,
        type: "new",
        description: "温润如玉的如意佩，雕刻精细，寓意吉祥如意，是珍贵的收藏品。"
      },
      {
        id: 6,
        name: "书卷·竹简",
        price: 90,
        type: "hot",
        description: "仿古竹简书卷，记录着古老的文字与智慧，是文人雅士的珍爱之物。"
      },
      {
        id: 7,
        name: "香炉·云烟",
        price: 250,
        type: "new",
        description: "云烟缭绕的香炉，采用上等陶瓷制作，焚香时香气悠远，营造宁静氛围。"
      },
      {
        id: 8,
        name: "茶具·紫砂",
        price: 400,
        type: "hot",
        description: "手工紫砂茶具套装，壶身温润如玉，泡茶时香气浓郁，是品茗的佳器。"
      }
    ];

    // 初始化用户灵石余额
    let balance = 500;
    const ownedProducts = new Set(); // 已拥有的商品ID

    // DOM 元素
    const productsContainer = document.getElementById('products-container');
    const balanceElement = document.getElementById('balance');
    const modal = document.getElementById('product-modal');
    const closeModal = document.getElementById('close-modal');
    const modalImage = document.getElementById('modal-image');
    const modalName = document.getElementById('modal-name');
    const modalDescription = document.getElementById('modal-description');
    const modalPrice = document.getElementById('modal-price');
    const purchaseBtn = document.getElementById('purchase-btn');
    const notification = document.getElementById('notification');

    // 更新余额显示
    function updateBalance() {
      balanceElement.textContent = balance;
    }

    // 显示通知
    function showNotification(message, isSuccess) {
      notification.textContent = message;
      notification.className = isSuccess ? 'notification success show' : 'notification error show';

      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    // 创建商品卡片
    function createProductCard(product) {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.dataset.id = product.id;

      // 判断是否已拥有
      const isOwned = ownedProducts.has(product.id);

      // 根据类型设置标签
      let tagClass = '';
      let tagText = '';
      if (product.type === 'hot') {
        tagClass = 'tag-hot';
        tagText = '热门';
      } else if (product.type === 'new') {
        tagClass = 'tag-new';
        tagText = '新品';
      }

      // 如果已拥有，显示"已拥有"标签
      let tagHTML = '';
      if (isOwned) {
        tagClass = 'tag-owned';
        tagText = '已拥有';
      } else if (product.type) {
        tagHTML = `<span class="product-tag ${tagClass}">${tagText}</span>`;
      }

      // 为每个商品设置不同颜色的背景
      const colors = [
        'linear-gradient(135deg, #7c3aed, #a855f7)',
        'linear-gradient(135deg, #0ea5e9, #0284c7)',
        'linear-gradient(135deg, #10b981, #059669)',
        'linear-gradient(135deg, #f59e0b, #d97706)',
        'linear-gradient(135deg, #ef4444, #dc2626)',
        'linear-gradient(135deg, #ec4899, #db2777)',
        'linear-gradient(135deg, #8b5cf6, #7c3aed)',
        'linear-gradient(135deg, #14b8a6, #0d9488)'
      ];

      const colorIndex = (product.id - 1) % colors.length;

      card.innerHTML = `
        <div class="product-image" style="background: ${colors[colorIndex]}">
          ${getProductEmoji(product.name)}
        </div>
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-price">${product.price} 灵石</div>
          ${tagHTML}
        </div>
      `;

      card.addEventListener('click', () => openProductModal(product));

      return card;
    }

    // 获取商品对应的emoji
    function getProductEmoji(name) {
      const emojis = {
        "汉服·青衫": "👘",
        "发簪·步摇": "簪",
        "折扇·山水": "扇",
        "灯笼·流光": "🏮",
        "玉佩·如意": "💎",
        "书卷·竹简": "📜",
        "香炉·云烟": "🪔",
        "茶具·紫砂": "🍵"
      };

      return emojis[name] || "🎨";
    }

    // 打开商品详情模态框
    function openProductModal(product) {
      modalImage.style.background = getBackgroundColor(product.id);
      modalImage.innerHTML = getProductEmoji(product.name);
      modalName.textContent = product.name;
      modalDescription.textContent = product.description;
      modalPrice.textContent = `${product.price} 灵石`;

      // 更新购买按钮状态
      const isOwned = ownedProducts.has(product.id);
      purchaseBtn.disabled = isOwned;
      purchaseBtn.textContent = isOwned ? '已拥有' : '购买';

      // 设置购买事件
      purchaseBtn.onclick = () => {
        if (isOwned) return;
        purchaseProduct(product);
      };

      modal.classList.add('active');
    }

    // 获取背景颜色
    function getBackgroundColor(id) {
      const colors = [
        'linear-gradient(135deg, #7c3aed, #a855f7)',
        'linear-gradient(135deg, #0ea5e9, #0284c7)',
        'linear-gradient(135deg, #10b981, #059669)',
        'linear-gradient(135deg, #f59e0b, #d97706)',
        'linear-gradient(135deg, #ef4444, #dc2626)',
        'linear-gradient(135deg, #ec4899, #db2777)',
        'linear-gradient(135deg, #8b5cf6, #7c3aed)',
        'linear-gradient(135deg, #14b8a6, #0d9488)'
      ];
      return colors[(id - 1) % colors.length];
    }

    // 购买商品
    function purchaseProduct(product) {
      if (balance < product.price) {
        showNotification('灵石不足', false);
        return;
      }

      // 扣除灵石
      balance -= product.price;
      updateBalance();

      // 记录已拥有商品
      ownedProducts.add(product.id);

      // 更新界面
      const cards = document.querySelectorAll('.product-card');
      cards.forEach(card => {
        if (card.dataset.id == product.id) {
          // 更新卡片标签
          const tag = card.querySelector('.product-tag');
          if (tag) {
            tag.className = 'product-tag tag-owned';
            tag.textContent = '已拥有';
          }

          // 更改购买按钮
          const btn = card.querySelector('.purchase-btn');
          if (btn) {
            btn.disabled = true;
            btn.textContent = '已拥有';
          }
        }
      });

      // 显示成功提示
      showNotification('购买成功！', true);

      // 关闭模态框
      modal.classList.remove('active');
    }

    // 关闭模态框
    closeModal.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    // 点击模态框背景关闭
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    });

    // 初始化页面
    function init() {
      // 创建商品卡片
      products.forEach(product => {
        const card = createProductCard(product);
        productsContainer.appendChild(card);
      });

      // 更新余额
      updateBalance();
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
